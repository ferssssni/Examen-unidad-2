<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Almacén Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
        nav { width: 240px; background: #2c3e50; color: white; height: 100vh; padding: 20px; position: fixed; }
        nav a { display: block; color: white; padding: 10px; cursor: pointer; text-decoration: none; margin-bottom: 5px; border-radius: 4px; }
        nav a:hover { background: #34495e; }
        main { margin-left: 280px; padding: 40px; width: 100%; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>
    <nav>
        <h2>CATÁLOGOS</h2>
        <a onclick="cargar('proveedores')">Proveedores</a>
        <a onclick="cargar('productos')">Productos</a>
        <a onclick="cargar('unidades')">Unidades</a>
        <a onclick="cargar('conceptos')">Conceptos</a>
        <a onclick="cargar('destinos')">Destinos</a>
    </nav>
    <main id="app">
        <h1>Seleccione un catálogo</h1>
    </main>

<script>
async function cargar(seccion) {
    const root = document.getElementById('app');
    root.innerHTML = '<h2>Cargando...</h2>';
    const res = await fetch(`/api/${seccion}`);
    const datos = await res.json();

    let html = `<h1>Catálogo: ${seccion.toUpperCase()}</h1><div class="card">`;
    
    if(seccion === 'proveedores') {
        html += `<input id="f1" placeholder="RFC"><input id="f2" placeholder="Nombre"><input id="f3" placeholder="Razón Social"><button onclick="enviarProv()">Guardar</button>`;
    } else {
        html += `<input id="f1" placeholder="Nombre"><button onclick="enviarSimple('${seccion}')">Guardar</button>`;
    }
    
    html += `</div><table><tr>${Object.keys(datos[0] || {id:0}).map(k => `<th>${k}</th>`).join('')}</tr>`;
    datos.forEach(f => html += `<tr>${Object.values(f).map(v => `<td>${v}</td>`).join('')}</tr>`);
    root.innerHTML = html + `</table>`;
}

async function enviarProv() {
    await post('proveedores', { rfc: f1.value, nombre_comercial: f2.value, razon_social: f3.value });
}

async function enviarSimple(s) {
    await post(s, { nombre: f1.value });
}

async function post(m, body) {
    await fetch(`/api/${m}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    cargar(m);
}
</script>
</body>
</html>
