<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Almacén</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Sistema Almacén</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="mostrarSeccion('conceptos')">Conceptos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="mostrarSeccion('destinos')">Destinos</a>
                    </li>
                    </ul>
            </div>
        </div>
    </nav>

    <div id="main-content" class="container">
        <div class="text-center mt-5">
            <h2>Bienvenido al Dashboard</h2>
            <p>Selecciona una opción del menú para comenzar.</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
    // Función para cargar los conceptos
    async function cargarModulo(modulo) {
        const contenedor = document.querySelector('main') || document.body; // Donde se mostrará la info
        
        if (modulo === 'conceptos') {
            try {
                const response = await fetch('/api/verduzco');
                const datos = await response.json();
                
                // Generamos una tablita simple con los datos
                let html = '<h2>Lista de Conceptos (Ferretería Verduzco)</h2><table border="1"><tr><th>Clave</th><th>Descripción</th></tr>';
                datos.forEach(item => {
                    html += `<tr><td>${item.clave}</td><td>${item.descripcion}</td></tr>`;
                });
                html += '</table>';
                
                contenedor.innerHTML = html;
            } catch (error) {
                contenedor.innerHTML = '<p>Error al conectar con la base de datos.</p>';
            }
        }
    }

    // Escuchar los clics del menú
    document.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', (e) => {
            if (e.target.innerText === 'Conceptos') {
                e.preventDefault();
                cargarModulo('conceptos');
            }
        });
    });
</script>
</body>
</html>
