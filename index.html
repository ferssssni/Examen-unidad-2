<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Almacén - Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; }
        nav { width: 250px; background: #333; color: white; height: 100vh; padding: 20px; }
        nav a { display: block; color: white; text-decoration: none; padding: 10px; margin: 5px 0; border-radius: 4px; }
        nav a:hover { background: #555; cursor: pointer; }
        main { flex-grow: 1; padding: 40px; background: #f4f4f4; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #eee; }
        .form-box { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <h2>Dashboard</h2>
    <hr>
    <strong>CATÁLOGOS</strong>
    <a onclick="cargarModulo('conceptos')">Conceptos</a>
    <a onclick="cargarModulo('destinos')">Destinos</a>
    <a onclick="cargarModulo('productos')">Productos</a>
    <a onclick="cargarModulo('unidades')">Unidades de Medida</a>
    <br>
    <strong>DOCUMENTOS</strong>
    <a onclick="alert('Solo interfaz por ahora')">Entradas</a>
    <a onclick="alert('Solo interfaz por ahora')">Salidas</a>
</nav>

<main id="contenido">
    <h1>Bienvenido al Sistema de Almacén</h1>
    <p>Selecciona una opción del menú para gestionar los datos en tiempo real.</p>
</main>

<script>
    async function cargarModulo(modulo) {
        const contenedor = document.getElementById('contenido');
        contenedor.innerHTML = '<h1>Cargando...</h1>';

        try {
            const res = await fetch(`/api/${modulo}`);
            const datos = await res.json();

            let html = `<h1>Módulo: ${modulo.charAt(0).toUpperCase() + modulo.slice(1)}</h1>`;
            
            // Formulario para agregar nuevos (Persistencia para el video)
            html += `
                <div class="form-box">
                    <h3>Agregar Nuevo Registro</h3>
                    <input type="text" id="nuevoNombre" placeholder="Nombre o Descripción">
                    <button onclick="guardarDato('${modulo}')">Guardar</button>
                </div>`;

            if (datos.length === 0) {
                html += '<p>No hay registros disponibles.</p>';
            } else {
                html += '<table><thead><tr>';
                Object.keys(datos[0]).forEach(key => html += `<th>${key.toUpperCase()}</th>`);
                html += '</tr></thead><tbody>';
                datos.forEach(fila => {
                    html += '<tr>' + Object.values(fila).map(v => `<td>${v}</td>`).join('') + '</tr>';
                });
                html += '</tbody></table>';
            }
            contenedor.innerHTML = html;
        } catch (error) {
            contenedor.innerHTML = '<h1>Error</h1><p>No se pudo conectar con la base de datos en la nube.</p>';
        }
    }

    async function guardarDato(modulo) {
        const valor = document.getElementById('nuevoNombre').value;
        if (!valor) return alert('Ingresa un valor');

        // Construir objeto según la tabla
        let body = {};
        if (modulo === 'conceptos') {
            body = { clave: Math.floor(Math.random()*900)+100, descripcion: valor, proveedor: 'Ferreteria Verduzco' };
        } else {
            body = { nombre: valor };
        }

        await fetch(`/api/${modulo}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        cargarModulo(modulo); // Refrescar tabla automáticamente
    }
</script>

</body>
</html>
